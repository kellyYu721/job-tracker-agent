<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <h1>Right-click each canvas and "Save image as"</h1>
  <p>icon16.png:</p>
  <canvas id="c16" width="16" height="16"></canvas>
  <p>icon48.png:</p>
  <canvas id="c48" width="48" height="48"></canvas>
  <p>icon128.png:</p>
  <canvas id="c128" width="128" height="128"></canvas>

  <script>
    function drawIcon(id, size) {
      const c = document.getElementById(id);
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#3b82f6";
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = "white";
      ctx.font = `bold ${size * 0.6}px Arial`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("J", size/2, size/2);
    }
    drawIcon("c16", 16);
    drawIcon("c48", 48);
    drawIcon("c128", 128);
  </script>
</body>
</html>
